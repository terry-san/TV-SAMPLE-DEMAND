name: Deploy to GitHub Pages

# 當程式碼推送到 main 分支時觸發
on:
  push:
    branches:
      - main

# 權限設定：允許 Actions 寫入倉庫內容（發布至 gh-pages 分支所需）
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出原始碼
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. 設定 Node.js 環境
      - name: Set up Node.js ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # 自動快取依賴，加快後續部署速度

      # 3. 安裝相依套件
      - name: Install dependencies 📦
        run: npm install

      # 4. 編譯專案 (產生 dist 資料夾)
      # 注意：此步驟會用到您 vite.config.js 中的 base 設定
      - name: Build 🏗️
        run: npm run build
        env:
          # 如果您的編譯過程需要 API Key，請在 GitHub Secrets 設定後在此引用
          VITE_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # 5. 發布至 GitHub Pages
      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist # Vite 預設的輸出目錄
          publish_branch: gh-pages # 指定發布到的分支
